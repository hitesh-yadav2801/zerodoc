name: zerodoc
description: "Zero Servers. Total Control. — Offline PDF toolkit."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  file_picker: ^8.1.7
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_hooks: ^0.20.5
  flutter_native_splash: ^2.4.4
  flutter_riverpod: ^2.6.1
  fpdart: ^1.1.0
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  hooks_riverpod: ^2.6.1
  logger: ^2.5.0
  path_provider: ^2.1.5
  pdfx: ^2.9.2
  riverpod_annotation: ^2.6.1
  share_plus: ^10.1.4
  shared_preferences: ^2.3.5
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.3
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/textures/

flutter_native_splash:
  color: "#F2F0E9"
  color_dark: "#1A1A1A"
  fullscreen: false
  android_12:
    color: "#F2F0E9"
    color_dark: "#1A1A1A"
    icon_background_color: "#F2F0E9"
    icon_background_color_dark: "#1A1A1A"
